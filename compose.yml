services:
  db:
    image: postgres:16
    container_name: mogi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mogi
      POSTGRES_USER: mogi
      POSTGRES_PASSWORD: mogi
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: